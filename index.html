<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F172A">
  <title>The Daily Ledger - Dashboard</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      --glass-bg: rgba(255, 255, 255, 0.10);
      --glass-hero: rgba(255, 255, 255, 0.16);
      --glass-border: rgba(255, 255, 255, 0.20);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.65);
      --accent-cyan: #38bdf8;
      --accent-green: #4ade80;
      --accent-amber: #fbbf24;
      --accent-red: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    }

    .dashboard-container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-top: 16px;
      padding-bottom: 40px;
    }

    /* Glass Cards Base */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
    }

    /* Top Navigation Header */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      border-radius: 30px;
    }

    .brand-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-sub);
    }

    .cycle-badge {
      font-size: 11px;
      background: rgba(255, 255, 255, 0.12);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* Metric Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-sub);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 15px;
      font-weight: 700;
    }

    /* Hero Glass Panel */
    .hero-card {
      background: var(--glass-hero);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-amount {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .pills-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .pill-green {
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: var(--accent-green);
    }

    .pill-red {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--accent-red);
    }

    /* Vault Progress Bar */
    .vault-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vault-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      width: 15%;
      background: linear-gradient(90deg, #38bdf8, #4ade80);
      border-radius: 10px;
    }

    /* Form Section */
    .form-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 12px;
      border-radius: 14px;
      font-size: 14px;
      outline: none;
    }

    input[type="number"] { width: 35%; }
    input[type="text"] { width: 65%; }

    .btn-add {
      background: var(--accent-cyan);
      color: #0f172a;
      border: none;
      padding: 12px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.25);
    }

    /* Ledger Table */
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-sub);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }

    .item-val {
      font-weight: 700;
      color: var(--accent-amber);
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <!-- Navigation Header -->
    <div class="glass-card app-header">
      <span class="brand-title">THE DAILY LEDGER</span>
      <span class="cycle-badge">Cycle: 6th – 6th</span>
    </div>

    <!-- Overview Stats Grid -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Income</div>
        <div class="stat-val" style="color: var(--accent-green);">₹16,000</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Fixed Rent</div>
        <div class="stat-val" style="color: var(--accent-amber);">₹8,000</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Allowance</div>
        <div class="stat-val" style="color: var(--accent-cyan);">₹8,000</div>
      </div>
    </div>

    <!-- Main Hero Dashboard Meter -->
    <div class="glass-card hero-card">
      <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); font-weight: 700;">
        Today's Safe-to-Spend Limit
      </div>
      <div class="hero-amount" id="safeSpendDisplay">₹0</div>
      
      <div class="pills-row">
        <span class="status-pill pill-green">🛡️ ₹20 Buffer Reserved</span>
        <span class="status-pill pill-red" id="rolloverPill">⚠️ ₹0 Rollover</span>
      </div>
    </div>

    <!-- Outings Vault Card -->
    <div class="glass-card vault-section">
      <div class="vault-header">
        <span style="color: var(--text-sub);">Outings Vault (15% Target)</span>
        <span style="color: var(--accent-cyan);" id="vaultAmount">₹1,200 Target</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- Quick Entry Form -->
    <div class="glass-card">
      <div class="section-title">Quick Log Expense</div>
      <div class="form-row">
        <input type="number" id="spendAmount" placeholder="₹ Amount" inputmode="decimal">
        <input type="text" id="spendNote" placeholder="For what? (e.g., Food)">
      </div>
      <button class="btn-add" onclick="addExpense()">Add Spend</button>
    </div>

    <!-- Activity Log -->
    <div class="glass-card">
      <div class="section-title">Today's Transactions</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const BASE_DAILY = 240; // Estimated daily limit based on ₹8,000 allowance minus savings/buffers

    let appData = JSON.parse(localStorage.getItem("dailyLedgerDashboardData")) || {
      todaySpend: 0,
      yesterdayOverspend: 0,
      logs: []
    };

    function updateDashboard() {
      let safeSpend = BASE_DAILY - appData.yesterdayOverspend - appData.todaySpend;
      
      document.getElementById("safeSpendDisplay").innerText = `₹${Math.max(0, safeSpend)}`;
      document.getElementById("rolloverPill").innerText = `⚠️ ₹${appData.yesterdayOverspend} Rollover`;

      const listEl = document.getElementById("historyList");
      listEl.innerHTML = "";
      if (appData.logs.length === 0) {
        listEl.innerHTML = `<div style="text-align:center; color: var(--text-sub); font-size: 12px; padding: 10px;">No entries logged today.</div>`;
      } else {
        appData.logs.forEach((item) => {
          listEl.innerHTML += `
            <div class="history-item">
              <span>${item.note}</span>
              <span class="item-val">-₹${item.amount}</span>
            </div>
          `;
        });
      }

      localStorage.setItem("dailyLedgerDashboardData", JSON.stringify(appData));
    }

    function addExpense() {
      const amountInput = document.getElementById("spendAmount");
      const noteInput = document.getElementById("spendNote");

      const amount = parseFloat(amountInput.value);
      const note = noteInput.value.trim() || "General Spend";

      if (!amount || amount <= 0) return;

      appData.todaySpend += amount;
      appData.logs.unshift({ amount, note });

      amountInput.value = "";
      noteInput.value = "";
      updateDashboard();
    }

    updateDashboard();
  </script>
</body>
</html>
